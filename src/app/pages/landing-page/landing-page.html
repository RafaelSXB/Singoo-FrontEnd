<main class="landing-container">
  
  <header class="header-section">

          <img src="assets/images/singoo-logo.svg" alt="Singoo Logo" class="logo"> 
          <div class="logo-glow"></div>

    <h1 class="main-title">UNLEASH YOUR<br>ENGLISH BY SINGING</h1>
    <p class="subtitle">Destrave seu inglês cantando.</p>
  </header>

  <section class="mockup-section">
    <div class="mockup-glow">
      <img src="assets/images/player-mockup.png" alt="Demonstração do Karaokê" class="mockup-image">
    </div>
    
    <div class="carousel-indicators">
      <span class="dot"></span>
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </section>

  <footer class="action-section">
    <button class="btn btn-primary" (click)="openRegister()">
      COMECE AGORA
    </button>
    <br>
    <button class="btn btn-secondary" (click)="onLogin()">
      JÁ TENHO CONTA
    </button>
  </footer>

  <app-bottom-sheet [isOpen]="isSheetOpen" (closed)="closeSheet()">
    @if (activeForm === 'register') {
    <app-register></app-register>
  }
</app-bottom-sheet>
</main>
