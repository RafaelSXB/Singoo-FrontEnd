<div class="catalog-container">
  <header class="catalog-header">
       <img src="assets/images/singoo-logo.svg" alt="Singoo Logo" class="logo"> 
       <div class="logo-glow"></div>
    <h1 class="title">BROWSE SONGS</h1>
    
    <div class="search-box">
      <input type="text" [formControl]="searchControl" placeholder="Search" class="search-input">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>
  </header>

  <main class="songs-list">
    
    @if (isLoading) {
      <div class="loading-state">Buscando sucessos...</div>
    } @else {
      
      @for (song of songs; track song.id) {
        <div class="song-card" (click)="goToStage(song.id, song.title)">
          
          <div class="thumbnail-wrapper">
            <img [src]="'https://img.youtube.com/vi/' + song.youtubeVideoId + '/mqdefault.jpg'" 
                 alt="Capa do vídeo" class="thumbnail-img">
            
            <div class="youtube-play-icon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
              </svg>
            </div>
          </div>

          <div class="song-info">
            <h2 class="song-title">{{ song.title }}</h2>
            <p class="song-artist">{{ song.artist }}</p>
            
            <div class="song-tags">
              <span class="tag difficulty" [ngClass]="song.difficulty.toLowerCase()">
                {{ song.difficulty === 'BEGINNER' ? 'INICIANTE' : 'AVANÇADO' }}
              </span>
              
              <span class="tag tier" [ngClass]="song.tierRequired.toLowerCase()">
                {{ song.tierRequired }}
              </span>
            </div>
          </div>
          
        </div>
      }

      @if (songs.length === 0) {
        <div class="empty-state">Nenhuma música encontrada.</div>
      }
    }
    
  </main>
</div>
